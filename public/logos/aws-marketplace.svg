  </g>
  <!-- "AWS" text -->
  <text x="92" y="35" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="800" fill="#232F3E" letter-spacing="0.5">AWS</text>
  <!-- "Marketplace" text -->
  <text x="92" y="60" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="600" fill="#232F3E">Marketplace</text>
