# =============================================================================
# SAM TEMPLATE — CutMyAWS Pre-Qualification API
# =============================================================================
#
# Deploys a Ruby Lambda function behind API Gateway HTTP API.
# Handles pre-qualification form submissions from cutmyaws.com.
#
# ARCHITECTURE:
#   API Gateway HTTP API (payload 2.0) → Lambda (Ruby 3.4, arm64)
#     → Cloudflare Turnstile verification
#     → TiDB Cloud (MySQL-compatible) for lead storage
#     → SES for email notification to David
#
# ENVIRONMENTS:
#   dev:  cutmyaws-dev  → api.dev.cutmyaws.com (future)
#   prod: cutmyaws-prod → api.cutmyaws.com
#
# DEPLOYMENT:
#   Automated via GitHub Actions on push to main (prod) or dev branch (dev).
#   NEVER deploy from the command line — always push to trigger CI/CD.
#
# SECRETS:
#   All secrets stored as SecureString in SSM. Resolved at deploy time in
#   GitHub Actions, injected via CloudFormation NoEcho parameters. This means:
#   - SSM values encrypted at rest (SecureString)
#   - Values masked in CloudFormation console (NoEcho: true)
#   - Lambda never calls SSM at runtime (zero cold start overhead)
#   - Values visible in Lambda env vars tab (anyone with lambda:GetFunctionConfiguration)
#
# AWS ACCOUNT: 731039145080 (Cut My AWS)
#
# =============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CutMyAWS API

# -----------------------------------------------------------------------------
# Parameters — Stage set via samconfig.toml, secrets injected by GitHub Actions
# -----------------------------------------------------------------------------
Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
    Description: Deployment stage (dev or prod)
  DbHost:
    Type: String
    NoEcho: true
    Description: TiDB Cloud hostname (from SSM)
  DbPort:
    Type: String
    NoEcho: true
    Description: TiDB Cloud port (from SSM)
  DbUser:
    Type: String
    NoEcho: true
    Description: TiDB Cloud username (from SSM)
  DbPass:
    Type: String
    NoEcho: true
    Description: TiDB Cloud password (from SSM)
  DbName:
    Type: String
    NoEcho: true
    Description: TiDB Cloud database name (from SSM)
  TurnstileSecretKey:
    Type: String
    NoEcho: true
    Description: Cloudflare Turnstile secret key (from SSM)

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Architectures:
      - arm64
    Runtime: ruby3.4
    Tracing: Active
    Environment:
      Variables:
        TZ: UTC
        env: !Ref Stage
        PREFIX: !Sub "cutmyaws-${Stage}"
        DB_HOST: !Ref DbHost
        DB_PORT: !Ref DbPort
        DB_USER: !Ref DbUser
        DB_PASS: !Ref DbPass
        DB_NAME: !Ref DbName
        TURNSTILE_SECRET_KEY: !Ref TurnstileSecretKey

Resources:
  # ---------------------------------------------------------------------------
  # API Gateway HTTP API
  # ---------------------------------------------------------------------------
  # NOTE: AccessLogSettings removed — SAM HttpApi with $default stage has a
  # known issue resolving log group ARN. Enable via AWS console instead:
  # API Gateway → cutmyaws API → Stages → $default → Logging → Enable
  CutMyApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Description: !Sub "CutMyAWS Pre-Qualification API (${Stage})"

  # ---------------------------------------------------------------------------
  # Lambda Function — Router
  # ---------------------------------------------------------------------------
  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "cutmyaws-${Stage}-router"
      Handler: router.router
      CodeUri: .
      Description: !Sub "CutMyAWS API router (${Stage})"
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/cutmyaws-${Stage}-router"
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref CutMyApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref CutMyApi
            Path: /
            Method: ANY
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:us-east-1:731039145080:parameter/cutmyaws/${Stage}/*"
        - Statement:
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: "*"

  # ---------------------------------------------------------------------------
  # CloudWatch Log Groups
  # ---------------------------------------------------------------------------
  RouterLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/cutmyaws-${Stage}-router"
      RetentionInDays: 60

  # ---------------------------------------------------------------------------
  # CloudWatch Alarms
  # ---------------------------------------------------------------------------
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "cutmyaws-${Stage}-lambda-errors"
      AlarmDescription: !Sub "Lambda errors exceeded threshold (${Stage})"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref RouterFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "cutmyaws-${Stage}-lambda-throttles"
      AlarmDescription: !Sub "Lambda throttled (${Stage})"
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref RouterFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "cutmyaws-${Stage}-lambda-duration"
      AlarmDescription: !Sub "Lambda duration approaching timeout (${Stage})"
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref RouterFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "cutmyaws-${Stage}-api-5xx"
      AlarmDescription: !Sub "API Gateway 5xx errors (${Stage})"
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref CutMyApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic

  # ---------------------------------------------------------------------------
  # SNS Topic — alarm notifications
  # ---------------------------------------------------------------------------
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "cutmyaws-${Stage}-alarms"

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlarmTopic
      Protocol: email
      Endpoint: david@cutmyaws.com

# -----------------------------------------------------------------------------
# Outputs
# -----------------------------------------------------------------------------
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${CutMyApi}.execute-api.us-east-1.amazonaws.com"
  FunctionName:
    Description: Lambda function name
    Value: !Ref RouterFunction
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt RouterFunction.Arn
