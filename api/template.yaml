# =============================================================================
# SAM TEMPLATE — CutMyAWS Pre-Qualification API
# =============================================================================
#
# Deploys a Ruby Lambda function behind API Gateway HTTP API.
# Handles pre-qualification form submissions from cutmyaws.com.
#
# ARCHITECTURE:
#   API Gateway HTTP API (payload 2.0) → Lambda (Ruby 3.4, arm64)
#     → Cloudflare Turnstile verification
#     → TiDB Cloud (MySQL-compatible) for lead storage
#     → SES for email notification to David
#
# ENVIRONMENTS:
#   dev:  cutmyaws-dev  → api.dev.cutmyaws.com (future)
#   prod: cutmyaws-prod → api.cutmyaws.com
#
# DEPLOYMENT:
#   Automated via GitHub Actions on push to main (prod) or dev branch (dev).
#   NEVER deploy from the command line — always push to trigger CI/CD.
#
# MANUAL DEPLOY (emergency only):
#   sam build && sam deploy --config-env prod
#
# AWS ACCOUNT: 731039145080 (Cut My AWS)
#
# SSM PARAMETERS (must exist before deploy):
#   /cutmyaws/{stage}/db/host           — TiDB Cloud hostname
#   /cutmyaws/{stage}/db/port           — TiDB Cloud port (4000)
#   /cutmyaws/{stage}/db/user           — TiDB Cloud username
#   /cutmyaws/{stage}/db/pass           — TiDB Cloud password (SecureString)
#   /cutmyaws/{stage}/db/name           — TiDB Cloud database name
#   /cutmyaws/{stage}/turnstile/secret_key — Cloudflare Turnstile secret
#
# =============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CutMyAWS Pre-Qualification API

# -----------------------------------------------------------------------------
# Parameters — set per environment via samconfig.toml
# -----------------------------------------------------------------------------
Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
    Description: Deployment stage (dev or prod)

Globals:
  Function:
    Timeout: 15
    MemorySize: 256
    Architectures:
      - arm64
    Runtime: ruby3.4
    # X-Ray tracing for end-to-end request visibility
    Tracing: Active
    Environment:
      Variables:
        TZ: UTC
        env: !Ref Stage
        PREFIX: !Sub "cutmyaws-${Stage}"
        # ---------------------------------------------------------------
        # ALL secrets are stored as SecureString in SSM and fetched
        # at runtime by awsssm_get_param() in app/libs/aws_ssm.rb.
        # This keeps secrets out of CloudFormation templates and the
        # Lambda console. Values are cached in ENV after first fetch.
        #
        # SSM params fetched at runtime:
        #   /cutmyaws/{stage}/db/host
        #   /cutmyaws/{stage}/db/port
        #   /cutmyaws/{stage}/db/user
        #   /cutmyaws/{stage}/db/pass
        #   /cutmyaws/{stage}/db/name
        #   /cutmyaws/{stage}/turnstile/secret_key
        # ---------------------------------------------------------------

Resources:
  # ---------------------------------------------------------------------------
  # API Gateway HTTP API
  # ---------------------------------------------------------------------------
  # CORS is handled by Lambda (router.rb OPTIONS handler + api_response.rb).
  # Do NOT configure CORS here — API Gateway's CORS handling can strip
  # Content-Type from Lambda responses, breaking JSON parsing.
  # ---------------------------------------------------------------------------
  PreQualApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      Description: !Sub "CutMyAWS Pre-Qualification API (${Stage})"
      # -----------------------------------------------------------------------
      # API Gateway Access Logging — all requests logged to CloudWatch
      # -----------------------------------------------------------------------
      # Logs every request with: requestId, IP, method, path, status, latency,
      # response length, integration status, errors, origin, user-agent.
      # Matches Ezra's access log format for consistency.
      # -----------------------------------------------------------------------
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.path","status":"$context.status","responseLength":"$context.responseLength","responseLatency":"$context.responseLatency","integrationLatency":"$context.integrationLatency","integrationStatus":"$context.integrationStatus","error":"$context.error.message","origin":"$request.header.origin","userAgent":"$request.header.user-agent","contentType":"$request.header.content-type"}'

  # ---------------------------------------------------------------------------
  # Lambda Function — Router
  # ---------------------------------------------------------------------------
  # Single function handles all routes via dynamic routing in router.rb.
  # See router.rb for routing pattern: {path}_{method}(event, context)
  # ---------------------------------------------------------------------------
  RouterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "cutmyaws-${Stage}-router"
      Handler: router.router
      CodeUri: .
      Description: !Sub "CutMyAWS API router (${Stage})"
      LoggingConfig:
        LogGroup: !Sub "/aws/lambda/cutmyaws-${Stage}-router"
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref PreQualApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref PreQualApi
            Path: /
            Method: ANY
      Policies:
        # SES: Send notification emails to David
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
        # SSM: Read secrets (DB credentials, Turnstile key)
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:us-east-1:731039145080:parameter/cutmyaws/${Stage}/*"
        # X-Ray: Tracing for end-to-end request visibility
        - Statement:
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: "*"

  # ---------------------------------------------------------------------------
  # CloudWatch Log Groups — explicit creation for retention control
  # ---------------------------------------------------------------------------
  # Lambda function logs (application-level: requests, DB queries, errors)
  RouterLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/cutmyaws-${Stage}-router"
      RetentionInDays: 60

  # API Gateway access logs (every HTTP request: IP, method, path, status, latency)
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/httpapi/cutmyaws-${Stage}"
      RetentionInDays: 60

# -----------------------------------------------------------------------------
# Outputs — used by GitHub Actions for verification and custom domain setup
# -----------------------------------------------------------------------------
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${PreQualApi}.execute-api.us-east-1.amazonaws.com/${Stage}"
  FunctionName:
    Description: Lambda function name
    Value: !Ref RouterFunction
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt RouterFunction.Arn
