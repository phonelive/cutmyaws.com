# =============================================================================
# API BUILD AND DEPLOY тАФ CutMyAWS Pre-Qualification API
# =============================================================================
#
# Deploys the Ruby Lambda API via AWS SAM.
#
# TRIGGER:
#   - Push to `main` branch with changes in api/ тЖТ deploys to DEV
#   - Push a git tag (v*)                        тЖТ deploys to PROD
#   - Manual workflow_dispatch (choose environment)
#
# STEPS:
#   1. Checkout code (sparse тАФ only api/ directory)
#   2. Set up Ruby 3.4, install gems for local validation
#   3. Rebuild gems in Docker for Lambda ARM64 compatibility
#   4. SAM build + deploy to the target environment
#   5. Warm Lambda and verify deployment health
#
# DEPLOYMENT RULE:
#   All deployments go through this workflow. NEVER deploy from the CLI.
#   Push to main (dev) or create a tag (prod) and let GitHub Actions handle it.
#
# AWS ACCOUNT: 731039145080 (Cut My AWS)
# REGION: us-east-1
#
# REQUIRED GITHUB SECRETS:
#   AWS_ACCESS_KEY_ID_CUTMYAWS     тАФ IAM user with deploy permissions
#   AWS_SECRET_ACCESS_KEY_CUTMYAWS тАФ IAM user secret key
#
# =============================================================================

name: API Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - api/**
      - .github/workflows/api.yml

jobs:
  # -------------------------------------------------------------------------
  # Detect changes тАФ for tag deploys, check if api files changed since
  # the previous tag. For branch pushes, paths filter handles this.
  # -------------------------------------------------------------------------
  detect-changes:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    outputs:
      api_changed: ${{ steps.check.outputs.api_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for API changes since last tag
        id: check
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found тАФ deploying everything"
            echo "api_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Comparing ${PREV_TAG}..${GITHUB_REF_NAME}"

          CHANGES=$(git diff --name-only "$PREV_TAG".."$GITHUB_REF_NAME" -- \
            'api/**' '.github/workflows/api.yml' | head -1)

          if [ -n "$CHANGES" ]; then
            echo "api_changed=true" >> $GITHUB_OUTPUT
            echo "API files changed тАФ will deploy"
          else
            echo "api_changed=false" >> $GITHUB_OUTPUT
            echo "No API files changed тАФ skipping deploy"
          fi

  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    needs: [detect-changes]
    if: |
      always() &&
      (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.api_changed == 'true')
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: cutmyaws-api-${{ github.ref_type == 'tag' && 'prod' || 'dev' }}
      cancel-in-progress: false

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout тАФ sparse checkout for speed (only api/ directory)
      # -----------------------------------------------------------------------
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            api
          sparse-checkout-cone-mode: true

      # -----------------------------------------------------------------------
      # 2. Determine environment from ref type or manual input
      # -----------------------------------------------------------------------
      - name: Set Environment
        id: setenv
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | head -c7)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            ENV="prod"
          else
            ENV="dev"
          fi

          echo "DEPLOY_ENV=${ENV}" >> $GITHUB_ENV
          echo "DEPLOY_ENV=${ENV}" >> $GITHUB_OUTPUT
          echo "Deploying to: ${ENV}"

      # -----------------------------------------------------------------------
      # 3. Configure AWS credentials (CutMyAWS account: 731039145080)
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_CUTMYAWS }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_CUTMYAWS }}
          aws-region: us-east-1

      # -----------------------------------------------------------------------
      # 4. Cache gems and Docker layers for faster deploys
      # -----------------------------------------------------------------------
      - name: Cache RubyGems
        id: cache-gems
        uses: actions/cache@v4
        with:
          key: cutmyaws-api-gems-${{ hashFiles('api/Gemfile.lock') }}
          path: |
            api/.bundle
            api/vendor

      # -----------------------------------------------------------------------
      # 5. Set up Ruby (for local gem install before Docker rebuild)
      # -----------------------------------------------------------------------
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'
          bundler-cache: false

      # -----------------------------------------------------------------------
      # 6. Install gems locally (needed for cache seeding)
      # -----------------------------------------------------------------------
      - name: Install Gems
        if: steps.cache-gems.outputs.cache-hit != 'true'
        run: |
          cd api
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4

      # -----------------------------------------------------------------------
      # 7. Rebuild gems in Docker for Lambda ARM64 compatibility
      # -----------------------------------------------------------------------
      # Native extensions (trilogy) must be compiled against Amazon Linux's
      # glibc and OpenSSL, not Ubuntu's. This Docker image matches Lambda's
      # runtime exactly.
      # -----------------------------------------------------------------------
      - name: Bundle Install for Lambda (Docker)
        if: steps.cache-gems.outputs.cache-hit != 'true'
        run: |
          docker run --platform linux/arm64 --rm \
            -v $PWD/api:/var/task -w /var/task \
            $(docker buildx build --platform linux/arm64 -q api/.docker/bundle-install)

      # -----------------------------------------------------------------------
      # 8. Set up SAM CLI
      # -----------------------------------------------------------------------
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # -----------------------------------------------------------------------
      # 9. SAM Build
      # -----------------------------------------------------------------------
      # Packages the Lambda function code. Uses --use-container=false since
      # we already built Lambda-compatible gems in the Docker step above.
      # -----------------------------------------------------------------------
      - name: SAM Build
        run: |
          cd api
          sam build --template-file template.yaml

      # -----------------------------------------------------------------------
      # 10. Resolve SSM Secrets
      # -----------------------------------------------------------------------
      # Fetch all SecureString params from SSM at deploy time.
      # Values are injected into CloudFormation as NoEcho parameters,
      # which masks them in the CloudFormation console. Lambda gets them
      # as env vars тАФ zero SSM API calls at runtime.
      # -----------------------------------------------------------------------
      - name: Resolve SSM Secrets
        run: |
          ENV="${{ env.DEPLOY_ENV }}"
          echo "Resolving SSM parameters for /cutmyaws/${ENV}/..."

          get_ssm() {
            aws ssm get-parameter --name "$1" --with-decryption --query Parameter.Value --output text
          }

          echo "DB_HOST=$(get_ssm /cutmyaws/${ENV}/db/host)" >> $GITHUB_ENV
          echo "DB_PORT=$(get_ssm /cutmyaws/${ENV}/db/port)" >> $GITHUB_ENV
          echo "DB_USER=$(get_ssm /cutmyaws/${ENV}/db/user)" >> $GITHUB_ENV
          echo "DB_PASS=$(get_ssm /cutmyaws/${ENV}/db/pass)" >> $GITHUB_ENV
          echo "DB_NAME=$(get_ssm /cutmyaws/${ENV}/db/name)" >> $GITHUB_ENV
          echo "TURNSTILE_SECRET_KEY=$(get_ssm /cutmyaws/${ENV}/turnstile/secret_key)" >> $GITHUB_ENV

          echo "All SSM parameters resolved."

      # -----------------------------------------------------------------------
      # 11. SAM Deploy
      # -----------------------------------------------------------------------
      # Deploys to the target environment using samconfig.toml settings.
      # SSM values are passed as CloudFormation parameter overrides.
      # -----------------------------------------------------------------------
      - name: SAM Deploy
        run: |
          cd api
          sam deploy \
            --config-env ${{ env.DEPLOY_ENV }} \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "Stage=${{ env.DEPLOY_ENV }}" \
              "DbHost=${{ env.DB_HOST }}" \
              "DbPort=${{ env.DB_PORT }}" \
              "DbUser=${{ env.DB_USER }}" \
              "DbPass=${{ env.DB_PASS }}" \
              "DbName=${{ env.DB_NAME }}" \
              "TurnstileSecretKey=${{ env.TURNSTILE_SECRET_KEY }}"

      # -----------------------------------------------------------------------
      # 12. Warm Lambda and verify deployment
      # -----------------------------------------------------------------------
      # Fire a health check to verify the Lambda boots, connects to TiDB,
      # and responds correctly. Also warms a few instances.
      # -----------------------------------------------------------------------
      - name: Warm Lambda & Verify Deployment
        run: |
          FUNCTION_NAME="cutmyaws-${{ env.DEPLOY_ENV }}-router"

          echo "Warming Lambda: ${FUNCTION_NAME}..."

          # Warm 3 instances in parallel
          for i in 1 2 3; do
            aws lambda invoke \
              --function-name "$FUNCTION_NAME" \
              --payload '{}' \
              --cli-binary-format raw-in-base64-out \
              /tmp/warm_$i.json &
          done

          # Wait for all warmups
          wait

          # Read the last response as health check
          RESPONSE=$(cat /tmp/warm_3.json 2>/dev/null || echo "{}")
          echo "Health check response: ${RESPONSE}"

          # Verify the response has a body with status
          BODY=$(echo "$RESPONSE" | jq -r '.body // empty' 2>/dev/null || echo "")
          if [ -n "$BODY" ]; then
            DB_STATUS=$(echo "$BODY" | jq -r '.db // empty' 2>/dev/null || echo "")
            echo "DB status: ${DB_STATUS}"
            if [ "$DB_STATUS" = "error" ]; then
              echo "WARNING: Database connection failed on health check"
            fi
          fi

          echo "Deployment complete: ${FUNCTION_NAME}"

      # -----------------------------------------------------------------------
      # 13. Print API URL
      # -----------------------------------------------------------------------
      - name: Print API URL
        run: |
          cd api
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "cutmyaws-${{ env.DEPLOY_ENV }}-api" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text 2>/dev/null || echo "unknown")
          echo "API URL: ${API_URL}"
          echo "Health check: ${API_URL}/prequal"
