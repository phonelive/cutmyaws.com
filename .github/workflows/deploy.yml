# =============================================================================
# SITE BUILD AND DEPLOY — CutMyAWS Static Site
# =============================================================================
#
# Deploys the Nuxt static site to S3 + CloudFront.
#
# TRIGGER:
#   - Push to `main` branch → deploys to DEV (dev.cutmyaws.com)
#   - Push a git tag (v*)    → deploys to PROD (cutmyaws.com)
#
# ENVIRONMENTS:
#   - dev:  S3 bucket dev-cutmyaws-com, CloudFront E3AM3WI3FESOBD
#   - prod: S3 bucket cutmyaws-com, CloudFront E1QP2X8FI34J2A
#
# =============================================================================

name: Deploy Site to AWS

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'api/**'
      - 'docs/**'
      - '*.md'

concurrency:
  group: deploy-site-${{ github.ref_type == 'tag' && 'prod' || 'dev' }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_CUTMYAWS }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_CUTMYAWS }}
  AWS_DEFAULT_REGION: us-east-1

jobs:
  # -------------------------------------------------------------------------
  # Detect changes — for tag deploys, check if site files changed since
  # the previous tag. For branch pushes, paths-ignore handles filtering.
  # -------------------------------------------------------------------------
  detect-changes:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    outputs:
      site_changed: ${{ steps.check.outputs.site_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for site changes since last tag
        id: check
        run: |
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — deploying everything"
            echo "site_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Comparing ${PREV_TAG}..${GITHUB_REF_NAME}"

          # Check if any non-api, non-docs, non-md files changed
          CHANGES=$(git diff --name-only "$PREV_TAG".."$GITHUB_REF_NAME" -- \
            ':!api/**' ':!docs/**' ':!*.md' | head -1)

          if [ -n "$CHANGES" ]; then
            echo "site_changed=true" >> $GITHUB_OUTPUT
            echo "Site files changed — will deploy"
          else
            echo "site_changed=false" >> $GITHUB_OUTPUT
            echo "No site files changed — skipping deploy"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() &&
      (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.site_changed == 'true')
    steps:
      - uses: actions/checkout@v6

      # -------------------------------------------------------------------
      # Determine environment from ref type
      # -------------------------------------------------------------------
      - name: Set Environment
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
            echo "S3_BUCKET=cutmyaws-com" >> $GITHUB_ENV
            echo "CF_DISTRO=E1QP2X8FI34J2A" >> $GITHUB_ENV
            echo "SITE_URL=https://cutmyaws.com" >> $GITHUB_ENV
            echo "NOINDEX=false" >> $GITHUB_ENV
            echo "Deploying to PROD (tag: ${{ github.ref_name }})"
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
            echo "S3_BUCKET=dev-cutmyaws-com" >> $GITHUB_ENV
            echo "CF_DISTRO=E3AM3WI3FESOBD" >> $GITHUB_ENV
            echo "SITE_URL=https://dev.cutmyaws.com" >> $GITHUB_ENV
            echo "NOINDEX=true" >> $GITHUB_ENV
            echo "Deploying to DEV (branch: main)"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: NUXT_PUBLIC_SITE_URL=${{ env.SITE_URL }} NUXT_PUBLIC_NOINDEX=${{ env.NOINDEX }} npx nuxt generate
      - run: node scripts/inline-css.mjs

      - name: Sync to S3
        run: aws s3 sync .output/public/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CF_DISTRO }} --paths "/*"
