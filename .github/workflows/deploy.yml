name: Deploy Site to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'api/**'
      - 'docs/**'
      - '*.md'

concurrency:
  group: deploy-site
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_CUTMYAWS }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_CUTMYAWS }}
  AWS_DEFAULT_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx nuxt generate
      - run: node scripts/inline-css.mjs

      - name: Sync to S3
        run: aws s3 sync .output/public/ s3://cutmyaws-com --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E1QP2X8FI34J2A --paths "/*"
